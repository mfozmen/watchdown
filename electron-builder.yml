# electron-builder packaging config. Produces installers from the electron-vite build:
# Windows (NSIS), macOS (dmg), and Linux (AppImage) — each built on its own OS by the release
# workflow (.github/workflows/release.yml) on a version tag. All builds are UNSIGNED for now
# (code signing needs certificates).
appId: com.mfozmen.watchdown
productName: Watchdown
copyright: © mfozmen — MIT
# electron-builder itself never publishes; the release workflow uploads the artifacts to the
# GitHub Release (keeps a local `npm run dist` side-effect-free).
publish: null
directories:
  output: release
  # icon.ico (Windows) + icon.png (macOS/Linux; electron-builder derives .icns) live here.
  # The default is build/, which is gitignored as build output — hence a tracked dir.
  buildResources: build-resources
# out/** is the electron-vite build; package.json carries "main" and the runtime deps
# (chokidar) that the main process requires externally. icon.png is bundled so the running app
# can set it as the BrowserWindow icon at runtime; the main process resolves it relative to its
# own module dir (out/main/../../build-resources), which lands inside the asar here.
files:
  - out/**/*
  - package.json
  - build-resources/icon.png
win:
  target: nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  target: dmg
  category: public.app-category.productivity
linux:
  target: AppImage
  category: Utility
