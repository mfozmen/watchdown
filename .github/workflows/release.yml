name: Release

# On a version tag, build the distributable on each OS and upload the artifacts to a draft
# GitHub Release. Builds are unsigned for now (code signing is a follow-up); the maintainer
# reviews the draft and publishes it. electron-builder itself doesn't publish (publish: null) —
# this workflow uploads, so a local `npm run dist` stays side-effect-free.

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the release and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributable
        run: npm run dist

      - name: Upload artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          draft: true # maintainer reviews the (unsigned) build, adds notes, then publishes
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
