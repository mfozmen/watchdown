name: Release

# On a version tag, build the distributable on each OS, then a single job collects the
# artifacts into a draft GitHub Release. Builds are unsigned for now (code signing is a
# follow-up); the maintainer reviews the draft and publishes it. electron-builder itself
# doesn't publish (publish: null) — this workflow uploads, so a local `npm run dist` stays
# side-effect-free.

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributable
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false # explicit: unsigned macOS build, no keychain lookup

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          if-no-files-found: ignore # each OS only produces its own installer type
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage

  release:
    name: Draft release
    needs: build # one job creates+uploads the release, so the matrix can't race to create it
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Draft the release with the installers
        uses: softprops/action-gh-release@v2
        with:
          draft: true # maintainer reviews the (unsigned) build, adds notes, then publishes
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
