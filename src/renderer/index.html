<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>Watchdown</title>
  </head>
  <body>
    <main id="editor" aria-label="Markdown editor"></main>
    <footer id="status" class="status" data-status="clean" role="status" aria-live="polite">
      <span class="status__dot" aria-hidden="true"></span>
      <span class="status__label">Saved</span>
      <span class="status__path"></span>
    </footer>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
