<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchdown</title>
    <!-- CSP is delivered as a response header from the main process (see applyCsp). -->

  </head>
  <body>
    <div id="workspace">
      <main id="editor" aria-label="Markdown source"></main>
      <article id="preview" aria-label="Rendered preview" tabindex="0"></article>
    </div>
    <footer id="status" class="status" data-status="clean" role="status" aria-live="polite">
      <span class="status__dot" aria-hidden="true"></span>
      <span class="status__label">Saved</span>
      <span class="status__presence" hidden>
        <span class="status__presence-dot" aria-hidden="true"></span>
        <span class="status__presence-text"></span>
      </span>
      <span class="status__path"></span>
    </footer>
    <!-- Connection Manager modal mounts here (outside the editor/preview panes). -->
    <div id="modal-root"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
