# SonarQube Cloud configuration.
#
# VERIFY these two keys against the Sonar project's "Project Information" /
# "Information" page in the SonarQube Cloud UI and adjust if they differ.
sonar.organization=mfozmen
sonar.projectKey=mfozmen_watchdown

# --- Source & test layout ---
# Sources live in src/. Test files also live in src/ alongside the code, so we
# mark them as tests via inclusions; Sonar then excludes them from the main
# source set automatically.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts

# --- Coverage ---
# lcov report emitted by `npm run test:coverage` (vitest v8 provider).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Exclusions ---
# Keep dependencies, build output, coverage artifacts, and config off the
# analysis; keep tests and config files out of the coverage denominator.
sonar.exclusions=node_modules/**,dist/**,out/**,build/**,coverage/**,**/*.config.ts
sonar.coverage.exclusions=**/*.test.ts,**/*.config.ts

sonar.sourceEncoding=UTF-8

# NOTE: do NOT set sonar.host.url here — this is SonarQube Cloud (hosted).
# sonar.host.url is only for a self-hosted SonarQube Server.
